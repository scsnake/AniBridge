<!doctype html>
<html data-i18n-title="optionsPageTitle">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AniBridge</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <img src="../icons/icon-128.png" width="72" height="72" alt="">
        <div>
          <p class="eyebrow">AniBridge</p>
          <h1 data-i18n="optionsHeading"></h1>
          <p data-i18n="optionsIntro"></p>
        </div>
      </header>

      <section class="section" aria-labelledby="tracking-title">
        <div class="section-head">
          <div>
            <h2 id="tracking-title" data-i18n="sectionTrackingTitle"></h2>
            <p data-i18n="sectionTrackingIntro"></p>
          </div>
          <button class="quiet" type="button" data-toggle="tracking" data-i18n="toggleAll"></button>
        </div>
        <div id="tracking-platforms" class="platforms"></div>
      </section>

      <section class="section" aria-labelledby="ratings-title">
        <div class="section-head">
          <div>
            <h2 id="ratings-title" data-i18n="sectionRatingsTitle"></h2>
            <p data-i18n="sectionRatingsIntro"></p>
          </div>
          <button class="quiet" type="button" data-toggle="ratings" data-i18n="toggleAll"></button>
        </div>
        <div id="ratings-platforms" class="platforms"></div>
      </section>

      <section class="section" aria-labelledby="streaming-title">
        <div class="section-head">
          <div>
            <h2 id="streaming-title" data-i18n="sectionStreamingTitle"></h2>
            <p data-i18n="sectionStreamingIntro"></p>
          </div>
          <button class="quiet" type="button" data-toggle-streaming data-i18n="toggleAll"></button>
        </div>
        <div id="streaming-platforms" class="platforms"></div>
      </section>

      <footer class="actions">
        <span id="status" role="status" aria-live="polite"></span>
        <button id="restore" class="secondary" type="button" data-i18n="restoreDefaults"></button>
        <button id="save" class="primary" type="button" data-i18n="saveSettings"></button>
      </footer>
    </main>
    <script src="../lib/i18n.js"></script>
    <script src="../lib/platforms.js"></script>
    <script src="options.js"></script>
  </body>
</html>
